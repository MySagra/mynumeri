name: Build and Push Docker Image

on:
  release:
    types: [created, published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mysagra-mynumeri

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. NUOVO STEP: Estrae metadati e genera i tag
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/mysagra/${{ env.IMAGE_NAME }}
          tags: |
            # Aggiunge il tag 'latest' se l'evento avviene sul branch principale
            type=raw,value=latest,enable={{is_default_branch}}
            # Se la pipeline è avviata da una release (es. v1.0.0), usa quel nome
            type=ref,event=tag
            # Se avviata a mano su un branch (es. main o dev), usa il nome del branch
            type=ref,event=branch
            # Aggiunge SEMPRE il tag con lo SHA del commit (es. sha-a1b2c3d)
            type=sha,format=short

      # 2. STEP AGGIORNATO: Usa gli output del metadata-action
      - name: Build and push mynumeri image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Iniettiamo i tag generati dinamicamente dallo step precedente
          tags: ${{ steps.meta.outputs.tags }}
          # Iniettiamo le labels (titolo, versione, data, ecc.)
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
