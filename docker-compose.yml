services:
  mynumeri:
    image: mynumeri-numeri
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mynumeri-numeri
    restart: always
    ports:
      - "3033:3033"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - mysagra_default

networks:
  mysagra_default:
    external: true
